        const fullData = window.PART2_RAW_DATA || rawData;
        const lines = fullData.trim().split('\n');
        const headers = lines[0].split('\t');
        const allRows = lines.slice(1).map(line => line.split('\t'));
        const rows = allRows;

        function toMaritalStatus(value) {
            return value === 'M' ? 'Married' : value === 'S' ? 'Single' : value;
        }

        function toGender(value) {
            return value === 'M' ? 'Male' : value === 'F' ? 'Female' : value;
        }

        function toCommuteDistance(value) {
            const match = String(value || '').match(/(\d+)-(\d+)\s+Miles/i);
            if (!match) return value;
            const start = match[1].padStart(2, '0');
            const end = match[2].padStart(2, '0');
            return `${start}-${end} Miles`;
        }

        function toAgeBracket(ageValue) {
            const age = Number(ageValue);
            if (!Number.isFinite(age)) return '';
            if (age <= 30) return 'Young Adult';
            if (age >= 55) return 'Senior';
            return 'Middle Age';
        }

        const workingHeaders = [
            'ID',
            'Marital Status',
            'Gender',
            'Income',
            'Children',
            'Education',
            'Occupation',
            'Home Owner',
            'Cars',
            'Commute Distance',
            'Region',
            'Age',
            'Age Brackets',
            'Purchased Bike'
        ];

        const workingRows = allRows.map((r) => {
            const age = r[11] || '';
            const childrenNumber = Number(r[4]);

            return [
                r[0] || '',
                toMaritalStatus(r[1] || ''),
                toGender(r[2] || ''),
                r[3] || '',
                Number.isFinite(childrenNumber) ? childrenNumber.toFixed(2) : (r[4] || ''),
                r[5] || '',
                r[6] || '',
                r[7] || '',
                r[8] || '',
                toCommuteDistance(r[9] || ''),
                r[10] || '',
                age,
                toAgeBracket(age),
                r[12] || ''
            ];
        });

        const table = document.createElement('table');
        table.className = 'excel-table';

        const thead = document.createElement('thead');
        const trHead = document.createElement('tr');
        headers.forEach(h => {
            const th = document.createElement('th');
            th.textContent = h;
            trHead.appendChild(th);
        });
        thead.appendChild(trHead);

        const tbody = document.createElement('tbody');
        rows.forEach((r, rowIndex) => {
            const tr = document.createElement('tr');
            r.forEach(c => {
                const td = document.createElement('td');
                td.textContent = c;
                tr.appendChild(td);
            });
            tr.addEventListener('click', () => showRowData(r, headers, rowIndex + 1));
            tbody.appendChild(tr);
        });

        table.appendChild(thead);
        table.appendChild(tbody);
        document.getElementById('rawTableHost').appendChild(table);

        const note = document.createElement('div');
        note.className = 'folder-path';
        note.textContent = `Showing all ${allRows.length} rows (scrollable). Click any row to view details.`;
        document.getElementById('rawTableHost').after(note);

        function showRowData(row, headers, rowNumber) {
            const modalData = document.getElementById('modalData');
            modalData.innerHTML = '';
            
            headers.forEach((header, idx) => {
                const dataRow = document.createElement('div');
                dataRow.className = 'data-row';
                
                const label = document.createElement('div');
                label.className = 'data-label';
                label.textContent = header + ':';
                
                const value = document.createElement('div');
                value.className = 'data-value';
                value.textContent = row[idx] || '';
                
                dataRow.appendChild(label);
                dataRow.appendChild(value);
                modalData.appendChild(dataRow);
            });
            
            document.getElementById('dataModal').classList.add('active');
        }

        function closeDataModal() {
            document.getElementById('dataModal').classList.remove('active');
        }

        // Create WORKING SHEET table

        const workingTable = document.createElement('table');
        workingTable.className = 'excel-table';

        const workingThead = document.createElement('thead');
        const workingTrHead = document.createElement('tr');
        workingHeaders.forEach(h => {
            const th = document.createElement('th');
            th.textContent = h;
            workingTrHead.appendChild(th);
        });
        workingThead.appendChild(workingTrHead);

        const workingTbody = document.createElement('tbody');
        workingRows.forEach((r, rowIndex) => {

            r.forEach(c => {
                const td = document.createElement('td');
                td.textContent = c;
                tr.appendChild(td);
            });
            tr.addEventListener('click', () => showRowData(r, workingHeaders, rowIndex + 1));
            workingTbody.appendChild(tr);
        });

        workingTable.appendChild(workingThead);
        workingTable.appendChild(workingTbody);
        document.getElementById('workingTableHost').appendChild(workingTable);

        const workingNote = document.createElement('div');
        workingNote.className = 'folder-path';
        workingNote.textContent = `Showing all ${workingRows.length} rows (scrollable). Click any row to view details.`;
        document.getElementById('workingTableHost').after(workingNote);

        const pivotDataImages = [
            'Age Group Count of Purchased Bike.png',
            'Average of Income.png',
            'Car Count of Purchased Bike.png',
            'Common Distance Count of Purchased Bike.png',
            'Education Count of Purchased Bike.png',
            'Gender Count of Purchased Bike.png',
            'Income Count of Purchased Bike.png',
            'Occupation Average of Cars.png',
            'Occupation Count of Purchased Bike.png',
            'Purchased Bike Average of Income.png',
            'Region Count of Purchased Bike.png',
            'slicer.png'
        ];

        const pivotChartImages = [
            'average income of those who purchased a bike.png',
            'average number  of cars owned per occupation.png',
            'most common age group of customer who purchase bikes.png',
            'most common education level of customer who purchased bike.png',
            'most common gender of customer who purchase bikes.png',
            'most common income range of customer who purcahase bikes.png',
            'most common occupation of customer who purchase bikes .png',
            'most common region of customer who purchase bikes.png',
            'total of car count of purchase bike.png',
            'total of count of purchased bike .png'
        ];

        const dashboardImages = [
            'dashboard.png'
        ];

        function renderImageGallery(hostId, basePath, imageList) {
            const host = document.getElementById(hostId);
            if (!host) return;

            if (!imageList.length) {
                const empty = document.createElement('div');
                empty.className = 'empty-state';
                empty.textContent = 'No images found.';
                host.appendChild(empty);
                return;
            }

            const gallery = document.createElement('div');
            gallery.className = 'gallery';

            const prettyName = (fileName) => fileName.replace(/\.[^.]+$/, '');

            imageList.forEach((fileName) => {
                const card = document.createElement('div');
                card.className = 'card';

                const label = document.createElement('p');
                label.textContent = prettyName(fileName);

                const img = document.createElement('img');
                img.src = encodeURI(`${basePath}/${fileName}`);
                img.alt = prettyName(fileName);
                img.loading = 'lazy';
                img.style.cursor = 'zoom-in';
                img.addEventListener('click', () => openLightbox(img));

                card.appendChild(label);
                card.appendChild(img);
                gallery.appendChild(card);
            });

            host.appendChild(gallery);
        }

        function renderDashboardImage(hostId, basePath, fileName) {
            const host = document.getElementById(hostId);
            if (!host) return;

            const prettyName = fileName.replace(/\.[^.]+$/, '');

            const card = document.createElement('div');
            card.className = 'dashboard-card';

            const title = document.createElement('div');
            title.className = 'dashboard-title';
            title.textContent = prettyName;

            const img = document.createElement('img');
            img.className = 'dashboard-image';
            img.src = encodeURI(`${basePath}/${fileName}`);
            img.alt = prettyName;
            img.loading = 'lazy';
            img.addEventListener('click', () => openLightbox(img));

            card.appendChild(title);
            card.appendChild(img);
            host.appendChild(card);
        }

        function openLightbox(imgEl) {
            document.getElementById('lightboxImage').src = imgEl.src;
            document.getElementById('lightboxTitle').textContent = imgEl.alt;
            document.getElementById('lightbox').classList.add('show');
        }

        function closeLightbox(event) {
            if (!event || event.target.id === 'lightbox' || event.target.classList.contains('lightbox-close')) {
                document.getElementById('lightbox').classList.remove('show');
            }
        }

        renderImageGallery(
            'pivotDataHost',
            'Part 2 Quiz2. Data Preparation and Visualization/pivot table/data',
            pivotDataImages
        );

        renderImageGallery(
            'pivotChartHost',
            'Part 2 Quiz2. Data Preparation and Visualization/pivot table/chart',
            pivotChartImages
        );

        renderDashboardImage(
            'dashboardHost',
            'Part 2 Quiz2. Data Preparation and Visualization/dashboard',
            dashboardImages[0]
        );

        document.getElementById('dataModal').addEventListener('click', (e) => {
            if (e.target.id === 'dataModal') {
                closeDataModal();
            }
        });

        const tabs = [
            { buttonId: 'rawTabBtn', contentId: 'raw' },
            { buttonId: 'workingTabBtn', contentId: 'working' },
            { buttonId: 'pivotDataTabBtn', contentId: 'pivotData' },
            { buttonId: 'pivotChartTabBtn', contentId: 'pivotChart' },
            { buttonId: 'dashboardTabBtn', contentId: 'dashboard' }
        ];

        tabs.forEach(({ buttonId, contentId }) => {
            const button = document.getElementById(buttonId);
            button.addEventListener('click', () => {
                tabs.forEach(({ buttonId: btnId, contentId: cId }) => {
                    document.getElementById(btnId).classList.remove('active');
                    document.getElementById(cId).classList.remove('active');
                });

                button.classList.add('active');
                document.getElementById(contentId).classList.add('active');
            });
        });
    </script>
</body>
</html>
