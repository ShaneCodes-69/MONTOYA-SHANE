<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Practice Task 2</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Courier New', monospace;
            background:
                radial-gradient(circle at 15% 20%, rgba(139, 92, 246, 0.35), transparent 40%),
                radial-gradient(circle at 85% 15%, rgba(34, 211, 238, 0.28), transparent 35%),
                radial-gradient(circle at 50% 80%, rgba(236, 72, 153, 0.25), transparent 40%),
                #050816;
            min-height: 100vh;
            padding: 10px;
            color: #b0bec5;
        }

        .container {
            max-width: 1700px;
            margin: 0 auto;
            background: rgba(15, 20, 45, 0.72);
            border: 2px solid;
            border-image: linear-gradient(135deg, #00d4ff, #7928ca, #00d4ff) 1;
            box-shadow: 0 0 40px rgba(0, 212, 255, 0.28);
            padding: 34px;
        }

        h1 {
            color: #00d4ff;
            text-shadow: 0 0 10px rgba(0, 212, 255, 0.7);
            margin-bottom: 10px;
            letter-spacing: 1px;
        }

        .back-link {
            display: inline-block;
            margin-bottom: 20px;
            color: #00d4ff;
            text-decoration: none;
            border: 2px solid #00d4ff;
            padding: 8px 12px;
            background: rgba(0, 212, 255, 0.07);
        }

        .back-link:hover {
            background: #00d4ff;
            color: #050816;
        }

        .notice {
            border: 2px solid #7928ca;
            background: rgba(121, 40, 202, 0.12);
            color: #e9d5ff;
            padding: 14px;
            margin-bottom: 20px;
        }

        .submission-link {
            display: inline-block;
            margin-top: 8px;
            color: #67e8f9;
            text-decoration: none;
            border: 2px solid #67e8f9;
            padding: 8px 12px;
            background: rgba(103, 232, 249, 0.08);
        }

        .submission-link:hover {
            background: #67e8f9;
            color: #050816;
        }
    </style>
</head>
<body>
    <div class="container">
        <a class="back-link" href="home.html">← Back to Home</a>
        <h1>Practice Task 2. Sales DashBoard Submission Link</h1>

        <div class="notice">
            Add your actual dashboard URL below.
            <br>
            <a class="submission-link" href="#">Open Dashboard Submission Link</a>
        </div>
    </div>
</body>
</html>
