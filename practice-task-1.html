<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Practice Task 1 - Images</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Courier New', monospace;
            background:
                radial-gradient(circle at 15% 20%, rgba(139, 92, 246, 0.35), transparent 40%),
                radial-gradient(circle at 85% 15%, rgba(34, 211, 238, 0.28), transparent 35%),
                radial-gradient(circle at 50% 80%, rgba(236, 72, 153, 0.25), transparent 40%),
                #050816;
            min-height: 100vh;
                padding: 10px;
            color: #b0bec5;
        }

        .container {
                max-width: 1700px;
            margin: 0 auto;
            background: rgba(15, 20, 45, 0.72);
            border: 2px solid;
            border-image: linear-gradient(135deg, #00d4ff, #7928ca, #00d4ff) 1;
            box-shadow: 0 0 40px rgba(0, 212, 255, 0.28);
                padding: 34px;
        }

        h1 {
            color: #00d4ff;
            text-shadow: 0 0 10px rgba(0, 212, 255, 0.7);
            margin-bottom: 10px;
            letter-spacing: 1px;
        }

        .back-link {
            display: inline-block;
            margin-bottom: 20px;
            color: #00d4ff;
            text-decoration: none;
            border: 2px solid #00d4ff;
            padding: 8px 12px;
            background: rgba(0, 212, 255, 0.07);
        }

        .back-link:hover {
            background: #00d4ff;
            color: #050816;
        }

        .download-link {
            display: inline-block;
            margin: 0 0 20px 10px;
            color: #00d4ff;
            text-decoration: none;
            border: 2px solid #7928ca;
            padding: 8px 12px;
            background: rgba(121, 40, 202, 0.12);
        }

        .download-link:hover {
            background: #7928ca;
            color: #ffffff;
        }

        .gallery {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(420px, 1fr));
            gap: 22px;
        }

        .card {
            border: 2px solid #7928ca;
            background: rgba(0, 212, 255, 0.04);
            padding: 10px;
            box-shadow: 0 0 15px rgba(121, 40, 202, 0.25);
        }

        .card p {
            color: #00d4ff;
            margin-bottom: 8px;
        }

        .card img {
            width: 100%;
            height: 420px;
            object-fit: contain;
            background: rgba(5, 8, 22, 0.9);
            border: 1px solid rgba(0, 212, 255, 0.6);
            display: block;
            cursor: zoom-in;
        }

        .lightbox {
            display: none;
            position: fixed;
            inset: 0;
            z-index: 9999;
            background: rgba(2, 6, 23, 0.95);
            padding: 24px;
            text-align: center;
        }

        .lightbox.show {
            display: block;
        }

        .lightbox img {
            max-width: 96vw;
            max-height: 88vh;
            margin-top: 28px;
            border: 2px solid #00d4ff;
            box-shadow: 0 0 40px rgba(0, 212, 255, 0.45);
            background: #050816;
        }

        .lightbox-title {
            color: #00d4ff;
            margin-top: 4px;
            margin-bottom: 12px;
            letter-spacing: 1px;
        }

        .lightbox-close {
            position: absolute;
            top: 14px;
            right: 20px;
            border: 2px solid #00d4ff;
            color: #00d4ff;
            background: #050816;
            width: 38px;
            height: 38px;
            font-size: 24px;
            line-height: 32px;
            cursor: pointer;
        }
    </style>
</head>
<body>
    <div class="container">
        <a class="back-link" href="home.html">← Back to Home</a>
        <a class="download-link" href="Practice%20Task%201%20Sales%20Revenue%20Dataset/Sales_Revenue_Dataset_Montoya.xlsx" download>⬇ Download Excel File</a>
        <h1>Practice Task 1 Sales Revenue Dataset</h1>

        <div class="gallery">
            <div class="card">
                <p>Revenue</p>
                <img src="Practice%20Task%201%20Sales%20Revenue%20Dataset/REVUNUE.png" alt="Revenue" onclick="openLightbox(this)">
            </div>
            <div class="card">
                <p>Dirty Data</p>
                <img src="Practice%20Task%201%20Sales%20Revenue%20Dataset/DIRTY%20DATA.png" alt="Dirty Data" onclick="openLightbox(this)">
            </div>
            <div class="card">
                <p>Client Table</p>
                <img src="Practice%20Task%201%20Sales%20Revenue%20Dataset/CLIENT%20TBL.png" alt="Client Table" onclick="openLightbox(this)">
            </div>
            <div class="card">
                <p>Department Table</p>
                <img src="Practice%20Task%201%20Sales%20Revenue%20Dataset/DEPARTMENT%20TBL.png" alt="Department Table" onclick="openLightbox(this)">
            </div>
            <div class="card">
                <p>Payment Table</p>
                <img src="Practice%20Task%201%20Sales%20Revenue%20Dataset/PAYMENT%20TBL.png" alt="Payment Table" onclick="openLightbox(this)">
            </div>
            <div class="card">
                <p>State Table</p>
                <img src="Practice%20Task%201%20Sales%20Revenue%20Dataset/STATE%20TBL.png" alt="State Table" onclick="openLightbox(this)">
            </div>
        </div>
    </div>

    <div id="lightbox" class="lightbox" onclick="closeLightbox(event)">
        <button class="lightbox-close" type="button" onclick="closeLightbox(event)">&times;</button>
        <div id="lightboxTitle" class="lightbox-title"></div>
        <img id="lightboxImage" src="" alt="Large preview">
    </div>

    <script>
        function openLightbox(imgEl) {
            document.getElementById('lightboxImage').src = imgEl.src;
            document.getElementById('lightboxTitle').textContent = imgEl.alt;
            document.getElementById('lightbox').classList.add('show');
        }

        function closeLightbox(event) {
            if (!event || event.target.id === 'lightbox' || event.target.classList.contains('lightbox-close')) {
                document.getElementById('lightbox').classList.remove('show');
            }
        }
    </script>
</body>
</html>
